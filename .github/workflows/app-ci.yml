name: App CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'models/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'models/**'
      - '.github/workflows/app-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run app tests
        run: pytest app/tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f app/Dockerfile -t sbb-delay-app .

      - name: Verify container starts
        run: |
          docker run -d --name sbb-app -p 8501:8501 sbb-delay-app
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:8501/_stcore/health || exit 1
          docker stop sbb-app

